name: moekyawaung_portfolio
description: Android Senior Dev Supreme Portfolio
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0          # GitHub API
  pdf: ^3.10.7          # PDF Export
  printing: ^5.12.0     # PDF Print
  flutter_html: ^3.0.0  # Rich CV
  lottie: ^2.7.0        # Animations
  video_player: ^2.8.1  # Background Video
  audioplayers: ^5.2.1  # Voice Resume
  particles_flutter: ^0.1.4  # Myanmar Flags
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  shared_preferences: ^2.2.2  # Theme Save
  url_launcher: ^6.2.2
  flutter_staggered_grid_view: ^0.7.0  # Cert Grid

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/moekyawaung.webp
    - assets/audio/voice-resume-en.mp3
    - assets/audio/voice-resume-mm.mp3
    - assets/video/bg.mp4
    - assets/lottie/custom-ikon.json
    - assets/certs/
